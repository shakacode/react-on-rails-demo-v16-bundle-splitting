kind: gvc
name: {{APP_NAME}}
spec:
  env:
    - name: RAILS_ENV
      value: production
    - name: RAILS_LOG_LEVEL
      value: info
    - name: RAILS_SERVE_STATIC_FILES
      value: "true"
    - name: SOLID_QUEUE_IN_PUMA
      value: "true"
    # Review apps run pull request code. Values mounted through cpln://secret
    # become readable by that code after the workload starts, so review-app
    # secret dictionaries must contain review-safe values.
    - name: SECRET_KEY_BASE
      value: cpln://secret/{{APP_SECRETS}}.SECRET_KEY_BASE
  staticPlacement:
    locationLinks:
      - {{APP_LOCATION_LINK}}
